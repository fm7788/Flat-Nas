name: Build and Release

on:
  push:
    tags:
      - "v*"
      - "V*"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: ${{ github.event_name == 'workflow_dispatch' && 'true' || '' }}
  DOCKER_IMAGE: qdnas/flatnas

permissions:
  contents: write
  packages: write

jobs:
  build-and-release:
    name: Build and Upload Release Assets
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Pull and Export Docker Images
        run: |
          mkdir -p docker_images
          
          # 1. 处理 AMD64：拉取、打Tag、导出、删除本地latest缓存
          echo "Processing amd64 image..."
          docker pull --platform linux/amd64 ${DOCKER_IMAGE}:latest
          docker tag ${DOCKER_IMAGE}:latest ${DOCKER_IMAGE}:amd64
          docker save -o docker_images/flatnas-amd64.tar ${DOCKER_IMAGE}:amd64
          docker rmi ${DOCKER_IMAGE}:latest ${DOCKER_IMAGE}:amd64
          
          # 2. 处理 ARM64：拉取、打Tag、导出、删除本地缓存
          echo "Processing arm64 image..."
          docker pull --platform linux/arm64 ${DOCKER_IMAGE}:latest
          docker tag ${DOCKER_IMAGE}:latest ${DOCKER_IMAGE}:arm64
          docker save -o docker_images/flatnas-arm64.tar ${DOCKER_IMAGE}:arm64
          docker rmi ${DOCKER_IMAGE}:latest ${DOCKER_IMAGE}:arm64
          
          # 3. 在根路径下直接压缩，保持相对路径正确
          echo "Compressing tar files..."
          gzip docker_images/flatnas-amd64.tar
          gzip docker_images/flatnas-arm64.tar
          
          echo "Docker images exported:"
          ls -lh docker_images

      # 1. Build Backend (Go)
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22.5"
          cache-dependency-path: backend/go.sum

      - name: Build Backend
        run: |
          cd backend
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o flatnas-server-amd64 .
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -ldflags="-s -w" -o flatnas-server-arm64 .

      # 2. Build Frontend (Vue)
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.12.0"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Build Frontend
        run: |
          cd frontend
          npm ci
          npm run build

      # 3. Prepare Artifacts
      - name: Prepare Release Package
        run: |
          mkdir -p release_pack_amd64/server
          mkdir -p release_pack_arm64/server
          
          # AMD64 版本
          cp backend/flatnas-server-amd64 release_pack_amd64/flatnas-server
          cp -r server/* release_pack_amd64/server/
          mkdir -p release_pack_amd64/server/public
          cp -r frontend/dist/* release_pack_amd64/server/public/
          cp deploy_debian.sh release_pack_amd64/
          
          # ARM64 版本
          cp backend/flatnas-server-arm64 release_pack_arm64/flatnas-server
          cp -r server/* release_pack_arm64/server/
          mkdir -p release_pack_arm64/server/public
          cp -r frontend/dist/* release_pack_arm64/server/public/
          cp deploy_debian.sh release_pack_arm64/

      # 4. Zip Artifacts
      - name: Create ZIP Archives
        run: |
          cd release_pack_amd64
          zip -r ../flatnas-amd64.zip ./*
          cd ../release_pack_arm64
          zip -r ../flatnas-arm64.zip ./*

      # 5. Upload to Release (增加了手动触发时的默认 Tag 兼容)
      - name: Upload Release Assets
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_type == 'tag' && github.ref_name || 'v-latest-manual' }}
          name: ${{ github.ref_type == 'tag' && github.ref_name || 'Manual Build' }}
          generate_release_notes: true
          files: |
            flatnas-amd64.zip
            flatnas-arm64.zip
            deploy_debian.sh
            docker_images/flatnas-amd64.tar.gz
            docker_images/flatnas-arm64.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}